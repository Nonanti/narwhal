# cargo-deny configuration
#
# Install: `cargo install cargo-deny`
# Run:     `cargo deny check`
#
# Wired into CI by `.github/workflows/ci.yml::audit` so a security
# advisory or a copyleft licence on a transitive dep breaks the build
# before it reaches main.

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ---------------------------------------------------------------------------
# Security advisories — RustSec database.
# ---------------------------------------------------------------------------
[advisories]
# v2 schema: emit a hard fail on any matching advisory.
version = 2
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "warn"
ignore = [
    # Add `RUSTSEC-YYYY-NNNN = "reason"` entries here when an upstream
    # advisory is acknowledged but cannot be remediated immediately.

    # `paste` is unmaintained but still required by `duckdb` 1.x via
    # its bindgen-generated bindings. Tracked upstream
    # (duckdb/duckdb-rs#612); will drop when duckdb-rs ships a
    # `paste`-free release.
    { id = "RUSTSEC-2024-0436", reason = "paste unmaintained, transitive through duckdb 1.x; no exploit path" },

    # `rustls-pemfile` <= 1.x is unmaintained; `tokio-postgres-rustls`
    # 0.13 still pulls the old major. Goes away when we bump to
    # tokio-postgres-rustls 0.14 (queued behind the dependabot PR).
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile 1.x unmaintained, transitive through tokio-postgres-rustls 0.13" },

    # `tokio-tar` PAX header parse advisory — transitive through a
    # dev-dep only test fixture and not reachable from the production
    # binary. Will revisit when an unaffected release ships.
    { id = "RUSTSEC-2025-0111", reason = "tokio-tar advisory, dev-dependency path only" },

    # `error-code`/`atomic-polyfill` IterMut Stacked-Borrows unsoundness
    # — transitive only, no UB observed on stable, fix is upstream-blocked.
    { id = "RUSTSEC-2026-0002", reason = "transitive unsoundness; stable does not exercise the path" },

    # `rustls-webpki` 0.101 carries two advisories (name-constraint
    # wildcard accept + CRL panic). Reachable only through `tiberius`
    # 0.12.3 → tokio-rustls 0.24 → rustls 0.21 → rustls-webpki 0.101.
    # Tiberius has no release on the new rustls stack yet; we do not
    # parse CRLs, and name-constraint exploit requires misissuance.
    # Drop both once tiberius ships on rustls 0.23+.
    { id = "RUSTSEC-2026-0098", reason = "rustls-webpki 0.101 via tiberius 0.12.3; URI name constraints not used in MSSQL TLS path, awaiting tiberius rustls upgrade" },
    { id = "RUSTSEC-2026-0099", reason = "rustls-webpki 0.101 via tiberius 0.12.3; CRL/name-constraint paths not exercised, awaiting tiberius rustls upgrade" },
    { id = "RUSTSEC-2026-0104", reason = "rustls-webpki 0.101 via tiberius 0.12.3; CRL parsing not used in MSSQL TLS path, awaiting tiberius rustls upgrade" },
]

# ---------------------------------------------------------------------------
# Licence allow-list. Anything outside this set fails the check so a
# transitive copyleft pull doesn't sneak in.
# ---------------------------------------------------------------------------
[licenses]
version = 2
# Standard permissive licences used across the Rust ecosystem.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    # Boost Software License: OSI-approved permissive (clipboard-win,
    # error-code).
    "BSL-1.0",
    # CDLA-Permissive-2.0: permissive licence used by the modern
    # webpki-roots crate for the bundled CA bundle.
    "CDLA-Permissive-2.0",
    # CC0 is dedicated to the public domain.
    "CC0-1.0",
    # MPL is weak copyleft (file-scoped); allowed because narwhal does
    # not modify any MPL-licensed file.
    "MPL-2.0",
]
# 0.8 lets cargo-deny auto-detect a couple of older crates that ship
# the licence as a hand-written file without SPDX tagging (notably
# webpki 0.22). 0.8 is still high enough to refuse misidentified text.
confidence-threshold = 0.8

# Some crates ship the licence as a hand-written LICENSE file rather
# than a SPDX tag; allow-list the well-known ones explicitly here.
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# `webpki` 0.22.x predates SPDX tagging — it ships an ISC LICENSE file
# at the crate root but cargo-deny can't auto-detect it with high
# enough confidence (no `license =` field in Cargo.toml). The transitive
# pull comes from `webpki` 0.22 major still propagating through old
# `rustls`; new 0.103+ versions carry the SPDX tag, so this exception
# only matters until that transitive dep is bumped (tracked under the
# tokio-postgres-rustls 0.14 dependabot PR).
[[licenses.exceptions]]
name = "webpki"
version = "0.22.4"
allow = ["ISC"]

# ---------------------------------------------------------------------------
# Duplicate / banned crates.
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
# Explicit ban list \u2014 leave empty for now, populate as ecosystem
# concerns surface.
deny = []
# `skip` lets known-OK duplicates through. The Rust ecosystem still
# has multiple major versions of common building blocks in flight;
# pin them here as they come up so the noise doesn't drown real
# regressions.
skip = []
skip-tree = []

# ---------------------------------------------------------------------------
# Source registry policy \u2014 narwhal only pulls from crates.io.
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
